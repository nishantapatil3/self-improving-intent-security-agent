name: 'Publish to Clawhub'
description: 'Publish your Claude Code skill or agent to Clawhub marketplace'
author: 'Nishant Patil'

branding:
  icon: 'upload-cloud'
  color: 'purple'

inputs:
  clawhub-token:
    description: 'Clawhub authentication token (required for publishing)'
    required: true
  version:
    description: 'Version to publish (defaults to version from package.json)'
    required: false
  package-dir:
    description: 'Directory containing package.json (defaults to current directory)'
    required: false
    default: '.'
  npm-token:
    description: 'Optional NPM token for publishing to npm registry'
    required: false
  node-version:
    description: 'Node.js version to use (must be >= 20 for Clawhub CLI)'
    required: false
    default: '20'

outputs:
  success:
    description: 'Whether the publish was successful (true/false)'
    value: ${{ steps.publish.outputs.success }}
  package-name:
    description: 'Name of the published package'
    value: ${{ steps.package-info.outputs.name }}
  package-version:
    description: 'Version of the published package'
    value: ${{ steps.package-info.outputs.version }}
  clawhub-url:
    description: 'URL to the skill on Clawhub'
    value: ${{ steps.publish.outputs.url }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'

    - name: Get package info
      id: package-info
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      run: |
        PACKAGE_NAME=$(node -p "require('./package.json').name")
        PACKAGE_VERSION=$(node -p "require('./package.json').version")

        echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
        echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

        echo "📦 Package: $PACKAGE_NAME"
        echo "🏷️  Version: $PACKAGE_VERSION"

    - name: Validate package.json
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      run: |
        # Ensure required fields are present
        if [ -z "${{ steps.package-info.outputs.name }}" ]; then
          echo "❌ Package name is missing from package.json"
          exit 1
        fi

        # Validate openclaw configuration
        node -e "const pkg = require('./package.json'); if (!pkg.openclaw) { console.error('❌ openclaw config missing in package.json'); process.exit(1); } console.log('✅ openclaw config valid');"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      run: npm ci || npm install

    - name: Publish to npm (optional)
      if: inputs.npm-token != ''
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.npm-token }}
        NPM_TOKEN: ${{ inputs.npm-token }}
      run: |
        echo "📦 Publishing to npm..."
        npm publish --access public || echo "⚠️  npm publish failed (continuing)"

    - name: Publish to Clawhub
      id: publish
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      env:
        CLAWHUB_TOKEN: ${{ inputs.clawhub-token }}
      run: |
        echo "📦 Installing Clawhub CLI..."
        npm install -g clawhub

        # Get the npm global bin directory and add to PATH
        NPM_BIN=$(npm config get prefix)/bin
        export PATH="$NPM_BIN:$PATH"
        echo "NPM bin directory: $NPM_BIN"

        # Check if clawhub is available
        if ! command -v clawhub &> /dev/null; then
          echo "⚠️  Clawhub CLI not found in PATH after installation"
          echo "Trying to use npx as fallback..."
          CLAWHUB_CMD="npx --yes clawhub@latest"
        else
          CLAWHUB_CMD="clawhub"
          echo "✅ Clawhub CLI found: $(which clawhub)"
        fi

        echo "🔑 Logging in to Clawhub..."
        if ! $CLAWHUB_CMD login --token "$CLAWHUB_TOKEN"; then
          echo "❌ Login failed"
          echo "success=false" >> $GITHUB_OUTPUT
          exit 1
        fi

        echo "✅ Successfully logged in"

        # Determine version to publish
        if [ -n "${{ inputs.version }}" ]; then
          PUBLISH_VERSION="${{ inputs.version }}"
        else
          PUBLISH_VERSION="${{ steps.package-info.outputs.version }}"
        fi

        echo "🚀 Publishing to Clawhub version $PUBLISH_VERSION..."
        if $CLAWHUB_CMD publish . --version "$PUBLISH_VERSION"; then
          echo "✅ Successfully published to Clawhub!"
          echo "success=true" >> $GITHUB_OUTPUT
          echo "url=https://clawhub.ai/${{ github.repository_owner }}/${{ steps.package-info.outputs.name }}" >> $GITHUB_OUTPUT
        else
          echo "❌ CLI publish failed"
          echo "success=false" >> $GITHUB_OUTPUT

          # Check if it's a "version already exists" error (exit code doesn't matter if continue-on-error)
          echo "📝 Note: If version already exists, create a new release with bumped version"
          echo "🔗 Your skill URL: https://clawhub.ai/${{ github.repository_owner }}/${{ steps.package-info.outputs.name }}"
          echo "url=https://clawhub.ai/${{ github.repository_owner }}/${{ steps.package-info.outputs.name }}" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Create summary
      if: always()
      shell: bash
      run: |
        echo "## 🚀 Clawhub Publish Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Package**: ${{ steps.package-info.outputs.name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.package-info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ steps.publish.outputs.success == 'true' && '✅ Published' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Clawhub URL**: [View on Clawhub](${{ steps.publish.outputs.url }})" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📝 Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "1. Verify the package appears on [Clawhub](${{ steps.publish.outputs.url }})" >> $GITHUB_STEP_SUMMARY
        echo "2. Test installation: \`claude skills add ${{ github.repository_owner }}/${{ steps.package-info.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "3. Share your skill with the community!" >> $GITHUB_STEP_SUMMARY
