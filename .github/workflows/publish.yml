name: Publish to Clawhub

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use package.json)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get package info
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Validate package.json
        run: |
          echo "📦 Package: ${{ steps.package.outputs.name }}"
          echo "🏷️  Version: ${{ steps.package.outputs.version }}"

          # Ensure required fields are present
          if [ -z "${{ steps.package.outputs.name }}" ]; then
            echo "❌ Package name is missing"
            exit 1
          fi

          # Validate openclaw configuration
          node -e "const pkg = require('./package.json'); if (!pkg.openclaw) { console.error('❌ openclaw config missing'); process.exit(1); } console.log('✅ openclaw config valid');"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests (if available)
        run: npm test || echo "⚠️  No tests configured"
        continue-on-error: true

      # Option 1: Publish to npm (if Clawhub syncs from npm)
      - name: Publish to npm
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "⏭️  Skipping npm publish - NPM_TOKEN not configured"
            exit 0
          fi
          echo "📦 Publishing to npm..."
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      # Option 2: Publish directly to Clawhub using CLI
      # If CLI fails, Clawhub will auto-sync from GitHub releases
      - name: Publish to Clawhub
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "⏭️  Skipping Clawhub publish - CLAWHUB_TOKEN not configured"
            exit 0
          fi

          echo "📦 Installing Clawhub CLI..."
          npm install -g clawhub

          # Get the npm global bin directory and add to PATH
          NPM_BIN=$(npm config get prefix)/bin
          export PATH="$NPM_BIN:$PATH"
          echo "NPM bin directory: $NPM_BIN"
          ls -la "$NPM_BIN" || echo "NPM bin not found at $NPM_BIN"

          # Check if clawhub is available
          if ! command -v clawhub &> /dev/null; then
            echo "⚠️  Clawhub CLI not found in PATH after installation"
            echo "Trying to use npx as fallback..."
            # Alternative: Try using npx with explicit package name
            CLAWHUB_CMD="npx --yes clawhub@latest"
          else
            CLAWHUB_CMD="clawhub"
            echo "✅ Clawhub CLI found: $(which clawhub)"
          fi

          echo "🔑 Logging in to Clawhub..."
          $CLAWHUB_CMD login --token "$CLAWHUB_TOKEN" || {
            echo "⚠️  Login failed, but continuing..."
          }

          echo "🚀 Publishing to Clawhub..."
          if $CLAWHUB_CMD publish .; then
            echo "✅ Successfully published to Clawhub!"
          else
            echo "⚠️  CLI publish failed"
            echo "📝 Don't worry! Clawhub auto-syncs from GitHub releases"
            echo "🔗 Your skill will appear at: https://clawhub.ai/${{ github.repository_owner }}/${{ steps.package.outputs.name }}"
          fi
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        continue-on-error: true


      - name: Create summary
        run: |
          echo "## 🚀 Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Package**: ${{ steps.package.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.package.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Clawhub URL**: https://clawhub.ai/${{ github.repository_owner }}/${{ steps.package.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify the package appears on [Clawhub](https://clawhub.ai/${{ github.repository_owner }}/${{ steps.package.outputs.name }})" >> $GITHUB_STEP_SUMMARY
          echo "2. Test installation: \`npx skills add ${{ github.repository_owner }}/${{ steps.package.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Update documentation if needed" >> $GITHUB_STEP_SUMMARY
