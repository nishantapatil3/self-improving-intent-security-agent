name: Publish to Clawhub

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use package.json)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Get package info
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Validate package.json
        run: |
          echo "📦 Package: ${{ steps.package.outputs.name }}"
          echo "🏷️  Version: ${{ steps.package.outputs.version }}"

          # Ensure required fields are present
          if [ -z "${{ steps.package.outputs.name }}" ]; then
            echo "❌ Package name is missing"
            exit 1
          fi

          # Validate openclaw configuration
          node -e "const pkg = require('./package.json'); if (!pkg.openclaw) { console.error('❌ openclaw config missing'); process.exit(1); } console.log('✅ openclaw config valid');"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests (if available)
        run: npm test || echo "⚠️  No tests configured"
        continue-on-error: true

      # Option 1: Publish to npm (if Clawhub syncs from npm)
      - name: Publish to npm
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "⏭️  Skipping npm publish - NPM_TOKEN not configured"
            exit 0
          fi
          echo "📦 Publishing to npm..."
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      # Option 2: Publish directly to Clawhub using skills CLI
      - name: Publish to Clawhub
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "⏭️  Skipping Clawhub publish - CLAWHUB_TOKEN not configured"
            exit 0
          fi
          echo "🔧 Publishing to Clawhub..."
          npx skills publish
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        continue-on-error: true

      # Option 3: Trigger webhook if Clawhub uses GitHub integration
      # Try common webhook endpoints
      - name: Notify Clawhub via webhook
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "⏭️  Skipping webhook - CLAWHUB_TOKEN not configured"
            exit 0
          fi
          if [ -n "$CLAWHUB_WEBHOOK_URL" ]; then
            echo "⏭️  Skipping auto-detect - custom webhook URL provided"
            exit 0
          fi

          # Try common webhook endpoints
          for endpoint in \
            "https://clawhub.ai/api/webhook/publish" \
            "https://clawhub.ai/api/v1/publish" \
            "https://api.clawhub.ai/webhook/github"
          do
            echo "📡 Trying webhook: $endpoint"
            if curl -X POST "$endpoint" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $CLAWHUB_TOKEN" \
              -d "{
                \"repository\": \"${{ github.repository }}\",
                \"version\": \"${{ steps.package.outputs.version }}\",
                \"release_url\": \"${{ github.event.release.html_url }}\",
                \"commit\": \"${{ github.sha }}\"
              }" \
              --fail-with-body; then
              echo "✅ Webhook succeeded: $endpoint"
              break
            else
              echo "⚠️  Webhook failed: $endpoint"
            fi
          done
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          CLAWHUB_WEBHOOK_URL: ${{ secrets.CLAWHUB_WEBHOOK_URL }}
        continue-on-error: true

      # Option 4: Custom webhook URL if provided
      - name: Notify Clawhub via custom webhook
        run: |
          if [ -z "$CLAWHUB_WEBHOOK_URL" ]; then
            echo "⏭️  Skipping custom webhook - CLAWHUB_WEBHOOK_URL not configured"
            exit 0
          fi
          echo "📡 Using custom webhook: $CLAWHUB_WEBHOOK_URL"
          curl -X POST "$CLAWHUB_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CLAWHUB_TOKEN" \
            -d "{
              \"repository\": \"${{ github.repository }}\",
              \"version\": \"${{ steps.package.outputs.version }}\",
              \"release_url\": \"${{ github.event.release.html_url }}\"
            }" \
            --fail-with-body
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          CLAWHUB_WEBHOOK_URL: ${{ secrets.CLAWHUB_WEBHOOK_URL }}
        continue-on-error: true

      - name: Create summary
        run: |
          echo "## 🚀 Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Package**: ${{ steps.package.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.package.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Clawhub URL**: https://clawhub.ai/${{ github.repository_owner }}/${{ steps.package.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify the package appears on [Clawhub](https://clawhub.ai/${{ github.repository_owner }}/${{ steps.package.outputs.name }})" >> $GITHUB_STEP_SUMMARY
          echo "2. Test installation: \`npx skills add ${{ github.repository_owner }}/${{ steps.package.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Update documentation if needed" >> $GITHUB_STEP_SUMMARY
